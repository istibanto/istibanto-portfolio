    img { display:block; width:100%; height:auto; }
    figcaption { padding:0.9rem 1rem 1.1rem; font-size:0.9rem; color:#ccc; }
    .tag { display:inline-block; margin-top:0.25rem; font-size:0.75rem; text-transform:uppercase; letter-spacing:0.09em; color:#999; }
